name: BoatRacing
main: es.jaie55.boatracing.BoatRacingPlugin
version: ${project.version}
api-version: '1.19'
authors: [Jaie55]
description: An F1‑style ice boat racing plugin for Bukkit/Spigot with a clean, vanilla‑like GUI. Compatible with Paper/Purpur. Manage teams, configure tracks with the built‑in BoatRacing selection tool, run timed races with checkpoints, pit area penalties, and a guided setup wizard.
website: https://modrinth.com/plugin/boatracing
softdepend: [PlaceholderAPI]
commands:
  boatracing:
    description: BoatRacing base command
    usage: /<command> teams|race|stats|setup|admin|reload|version
    permission: boatracing.use
permissions:
  boatracing.*:
    description: Grant ALL BoatRacing permissions
    default: false
    children:
      boatracing.use: true
      boatracing.teams: true
      boatracing.version: true
      boatracing.stats: true
      boatracing.stats.others: true
      boatracing.reload: true
      boatracing.update: true
      boatracing.setup: true
      boatracing.admin: true
      boatracing.admin.language: true
      boatracing.race.join: true
      boatracing.race.leave: true
      boatracing.race.forfeit: true
      boatracing.race.back: true
      boatracing.race.practice: true
      boatracing.race.status: true
      boatracing.race.voteopen: true
      boatracing.race.admin: true
  boatracing.use:
    description: Meta permission for BoatRacing base usage
    default: true
    children:
      boatracing.teams: true
      boatracing.version: true
      boatracing.stats: true
      boatracing.stats.others: true
      boatracing.race.join: true
      boatracing.race.leave: true
      boatracing.race.forfeit: true
      boatracing.race.back: true
      boatracing.race.practice: true
      boatracing.race.status: true
  boatracing.teams:
    description: Use /boatracing teams
    default: true
  boatracing.version:
    description: Use /boatracing version
    default: true
  boatracing.stats:
    description: View player statistics with /boatracing stats [player]
    default: true
  boatracing.stats.others:
    description: View other players' statistics with /boatracing stats <player>
    default: true
  boatracing.reload:
    description: Reload BoatRacing plugin configuration and data
    default: op
  boatracing.update:
    description: Receive in-game update notifications
    default: op
  boatracing.setup:
    description: Configure tracks and regions (admins)
    default: op
  boatracing.admin:
    description: Administer teams and players (create/rename teams, assign members, set numbers/boats)
    default: op
    children:
      boatracing.use: true
      boatracing.teams: true
      boatracing.version: true
      boatracing.stats: true
      boatracing.stats.others: true
      boatracing.reload: true
      boatracing.update: true
      boatracing.setup: true
      boatracing.admin.language: true
      boatracing.race.join: true
      boatracing.race.leave: true
      boatracing.race.forfeit: true
      boatracing.race.back: true
      boatracing.race.practice: true
      boatracing.race.status: true
      boatracing.race.voteopen: true
      boatracing.race.admin: true
  boatracing.admin.language:
    description: Change plugin language with /boatracing admin language <code>
    default: op
  boatracing.race.join:
    description: Join a race registration
    default: true
  boatracing.race.forfeit:
    description: Forfeit a race
    default: true
  boatracing.race.leave:
    description: Leave a race registration
    default: true
  boatracing.race.back:
    description: Return to your saved pre-lobby location
    default: true
  boatracing.race.practice:
    description: Start a solo practice race
    default: true
  boatracing.race.status:
    description: View race status for a track
    default: true
  boatracing.race.voteopen:
    description: Open map voting with /boatracing race voteopen
    default: op
  boatracing.race.admin:
    description: Manage races (open/start/force/stop) and close map votes
    default: op
