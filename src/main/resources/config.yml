# ------------------------------------------------------------
# General
# ------------------------------------------------------------
# Prefix shown in chat, titles, and command feedback.
prefix: "&6[BoatRacing] "
# Default language bundle. Bundled: en/es/es_419/fr/pt_BR/pt_PT/de/it/pl/tr/ja/ko/sv/zh_TW/zh_CN/ru.
# Custom: set e.g. "eo" and create messages_eo.yml in plugins/BoatRacing/.
language: "en"
# Maximum players per team.
max-members-per-team: 2

# ------------------------------------------------------------
# Team Permissions
# ------------------------------------------------------------
player-actions:
  # Allow non-admin players to perform these actions
  allow-team-create: true
  allow-team-rename: false
  allow-team-color: false
  allow-team-disband: false
  allow-set-boat: true
  allow-set-number: true
  # Allow non-admin players to open, start, force-start and stop races.
  # Can also be overridden per-track in tracks/<name>.yml under racing.allow-player-start
  allow-player-race-start: false

# ------------------------------------------------------------
# Setup Helpers
# ------------------------------------------------------------
setup:
  selection-visualizer:
    enabled: true
    # If true, particles are shown only while holding the BoatRacing wand.
    show-only-with-wand: true
    # Refresh interval in ticks (20 ticks = 1 second).
    period-ticks: 10
    # Any Bukkit particle that does not require extra data.
    particle: "END_ROD"
    # Distance between points in the wireframe (blocks).
    spacing: 1.0
    # Safety cap per player per refresh to protect TPS in huge selections.
    max-particles-per-player: 250
    # Skip rendering only if the player is too far from the selection box.
    # Once inside this range, the full wireframe is rendered.
    view-distance: 96.0

# ------------------------------------------------------------
# Persistent Storage
# ------------------------------------------------------------
# Persistent player data is stored here instead of in YAML files.
# This covers competitive stats, practice stats, and practice ghosts.
# Modes:
#   YAML   -> local YAML files (`stats.yml`, `practice-stats.yml`, `practice-ghosts.yml`)
#   SQLITE -> local SQLite database file
#   MYSQL  -> external/shared MySQL database
# SQLITE is recommended for a single server.
# MYSQL is useful if you want multiple servers to share the same data.
database:
  mode: "SQLITE"
  # When enabled, the first load imports existing YAML data into the database.
  # Only applies when mode is SQLITE or MYSQL.
  migrate-legacy-yaml: true
  # Table used to store the YAML documents in the database.
  # Only applies when mode is SQLITE or MYSQL.
  table: "boatracing_data"
  sqlite:
    # Used only when mode is SQLITE.
    # Relative to the plugin data folder.
    file: "boatracing.db"
  mysql:
    # Used only when mode is MYSQL.
    host: "localhost"
    port: 3306
    database: "boatracing"
    username: "root"
    password: ""
    # Optional advanced JDBC params. Leave empty to use safe defaults.
    parameters: ""

# ------------------------------------------------------------
# Practice Ghosts
# ------------------------------------------------------------
practice:
  ghost:
    enabled: true
    # Keep ghost mode scoped to solo practice sessions.
    only-in-practice: true
    # Capture interval in ticks while a practice run is active.
    sample-ticks: 2
    # Replay update interval in ticks.
    playback-ticks: 1
    # Minimum movement distance (blocks) required to store a new sample.
    min-distance: 0.20
    # Safety cap to avoid unbounded memory/IO on very long runs.
    max-samples: 6000
    # Show runner name above the ghost rider.
    show-name: true

# ------------------------------------------------------------
# Metrics and Updates
# ------------------------------------------------------------
bstats:
  enabled: true
  # Anonymous usage metrics via bStats. Set to false to opt-out.
updates:
  enabled: true
  # Log a WARN in console on startup if out of date
  console-warn: true
  # Notify admins with permission in-game on join
  notify-admins: true

# ------------------------------------------------------------
# Race Defaults
# ------------------------------------------------------------
racing:
  # Default values for all tracks. Each track can override these
  # in its own tracks/<name>.yml file under a 'racing:' section.
  # Example in tracks/speedway.yml:
  #   racing:
  #     laps: 5
  #     mandatory-pitstops: 1
  #     pit-penalty-seconds: 3.0
  laps: 3
  mandatory-pitstops: 0  # Number of mandatory pit stops per racer per race; 0 to disable
  pit-penalty-seconds: 5.0
  registration-seconds: 300
  min-players-to-start: 1  # Minimum online registered players required to start; can be overridden per-track
  broadcast-mode: "global" # Accepted values: "global" (every online player), "racers" (only participants, except for registration)
  # Optional lobby while registration is open.
  # When enabled, players are teleported to this location when they join registration.
  # If they leave registration or the registration is cancelled, they are teleported back.
  lobby:
    enabled: false
    return-on-leave: true
    # Time window after race finish/cancel to allow /boatracing race back
    back-window-seconds: 180
    world: "world"
    x: 0.0
    y: 80.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0
  # Time penalty applied if a racer moves forward before the countdown ends (in seconds)
  false-start-penalty-seconds: 3.0
  # Enable/disable time penalty when entering the pit area during the race
  enable-pit-penalty: true
  # Enable/disable false start penalty during the light countdown
  enable-false-start-penalty: true
  # Delay between all 5 lights lit and 'lights out' (seconds); allows a brief suspense before GO
  lights-out-delay-seconds: 1.0
  # Optional random jitter added on top of the delay (random between 0 and this value)
  lights-out-jitter-seconds: 0.0

  # Scoreboard & ActionBar customization
  ui:
    scoreboard:
      show-position: true    # rank number at line start
      show-lap: true         # L X/Y
      show-checkpoints: true # CP A/B (hidden if no checkpoints configured)
      show-pitstops: true    # PIT A/B (hidden if mandatory-pitstops is 0)
      show-name: true        # player name at end of line
    actionbar:
      show-lap: true
      show-checkpoints: true
      show-pitstops: true
      show-time: true

  # Registration announce message is language-specific and defined in:
  # messages_<lang>.yml -> race.registration.announce
  # Placeholders available there: {track}, {laps}, {cmd}, {label}

  # Rewards given to players when a race ends.
  # Fully customizable per finishing position.
  # Placeholders available in commands, messages, and broadcast:
  #   {player}   - player name
  #   {position} - finishing position (1, 2, 3...)
  #   {time}     - formatted finish time (e.g. 1:23.456)
  #   {track}    - track name
  #   {laps}     - total laps
  rewards:
    enabled: false  # Set to true to activate rewards
    positions:
      # 1st place rewards
      1:
        commands: []
        # Example commands:
        # - "give {player} diamond 5"
        # - "eco give {player} 1000"
        messages:
          - "&6&l1st Place! &eCongratulations, you won the race on &f{track}&e!"
        broadcast: []
      # 2nd place rewards
      2:
        commands: []
        messages:
          - "&7&l2nd Place! &7Nice race on &f{track}&7!"
        broadcast: []
      # 3rd place rewards
      3:
        commands: []
        messages:
          - "&c&l3rd Place! &7Good effort on &f{track}&7!"
        broadcast: []
      # Fallback for any position not listed above
      default:
        commands: []
        messages:
          - "&7You finished the race on &f{track}&7 in position &f#{position}&7."
        broadcast: []
